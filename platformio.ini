; PlatformIO Project Configuration File

[platformio]
default_envs = huzzah   ; WiFi disabled — use huzzah_wifi to enable

[common]
platform  = espressif8266
board     = huzzah
framework = arduino
monitor_speed = 115200
build_flags =
    -D ARDUINO_ESP8266_RELEASE
    -D PIO_FRAMEWORK_ARDUINO_MMU_CACHE16_IRAM48
    -D IRAM_ATTR="__attribute__((section(\".iram.text\")))"
    -I src
lib_deps =
    adafruit/Adafruit Unified Sensor@^1.1.15
    Servo(esp8266)
    boschsensortec/bsec2@^1.10.2610
    boschsensortec/BME68x Sensor library@^1.3.40408

; --- Default build: no WiFi, no debug output ---
[env:huzzah]
extends = common

; --- WiFi build: enables BirdyAPI, requires src/secrets.h ---
[env:huzzah_wifi]
extends = common
build_flags =
    ${common.build_flags}
    -D WIFI_ENABLED
lib_deps =
    ${common.lib_deps}
    bblanchon/ArduinoJson@^7.4.1

; --- Debug build: verbose serial output ---
[env:huzzah_debug]
extends = common
build_flags =
    ${common.build_flags}
    -D DEBUG
    -D CORE_DEBUG_LEVEL=3
